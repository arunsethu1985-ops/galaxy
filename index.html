<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Galaxy</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://js.puter.com/v2/"></script>
</head>

<body>

<div id="intro">
  <video id="introVideo" autoplay muted playsinline>
 <source src="Initial_Scene_-_2026-07-18_202607181317 (1).mp4" type="video/mp4">
  </video>

  <div class="intro-overlay">
    <h1>GALAXY</h1>
    <p>Created by Harshavrdhan</p>
  </div>
</div>

<div class="app" id="app" style="display:none;">

    <aside class="sidebar">
      <div class="brand">
        <div class="logo">✦</div>

        <div>
          <h1>Galaxy</h1>
          <p>Created by Harshavrdhan</p>
        </div>
      </div>

      <button id="newChatButton" class="new-chat-button">
        ＋ New chat
      </button>

      <h2 class="section-title">Recent chats</h2>

      <div id="recentChats" class="recent-chats">
        <p class="empty-message">No recent chats</p>
      </div>

      <div class="sidebar-footer">
        Galaxy AI Assistant<br />
        Created by Harshavrdhan
      </div>
    </aside>

    <main class="main">

      <header class="topbar">
        <h2 id="chatTitle">Galaxy</h2>

        <div class="status">
          <span class="status-dot"></span>
          <span>AI assistant</span>
        </div>
      </header>

      <section id="chatArea" class="chat-area">
        <div id="messages" class="messages">

          <div id="welcome" class="welcome">
            <div class="welcome-logo">✦</div>

            <h2>How can I help you?</h2>

            <p>
              I'm Galaxy, an AI assistant created by Harshavrdhan.
            </p>

            <div class="suggestions">
              <button class="suggestion" data-message="Explain artificial intelligence simply">
                <strong>Explain something</strong>
                <span>Learn a difficult topic simply</span>
              </button>

              <button class="suggestion" data-message="Help me write a professional message">
                <strong>Help me write</strong>
                <span>Create messages and ideas</span>
              </button>

              <button class="suggestion" data-message="Help me learn coding">
                <strong>Help with coding</strong>
                <span>Write or fix computer code</span>
              </button>

              <button class="suggestion" data-message="Give me creative project ideas">
                <strong>Brainstorm ideas</strong>
                <span>Generate creative suggestions</span>
              </button>
            </div>
          </div>

        </div>
      </section>

      <section class="input-section">
        <div class="input-wrapper">

          <div class="input-box">
            <textarea
              id="messageInput"
              rows="1"
              placeholder="Message Galaxy..."
            ></textarea>

            <button id="sendButton" class="send-button">
              ↑
            </button>
          </div>

          <p class="input-note">
            Press Enter to send · Shift + Enter for a new line
          </p>

        </div>
      </section>

    </main>
  </div>

 <script src="script.js"></script>

<script>
const introVideo = document.getElementById("introVideo");
const intro = document.getElementById("intro");
const app = document.getElementById("app");

introVideo.addEventListener("ended", () => {
    intro.style.display = "none";
    app.style.display = "flex";
});
</script>

</body>
</html>
